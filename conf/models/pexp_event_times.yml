# Piecewise-exponential (Poisson GLM) — event-time cuts, baseline covariates.
#
# All keys except `engine` are forwarded verbatim as arguments to
# fit_poisson_interval(emae, formula, cut_strategy, time_varying, predict_target).
# See conf/models/README.md for the full schema.

engine: pexp
formula: "event ~ age_at_start + interval"
cut_strategy: event_times
time_varying: []
predict_target: extrapolate_baseline
