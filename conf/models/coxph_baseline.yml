# Cox proportional hazards — baseline covariates only.
#
# All keys except `engine` are forwarded verbatim as arguments to
# fit_coxph(emae, formula, time_varying, predict_target).
# See conf/models/README.md for the full schema.

engine: coxph
formula: "Surv(t_start, t_end, event) ~ age_at_start"
time_varying: []
impute_covariate_trajectory: extrapolate_baseline
